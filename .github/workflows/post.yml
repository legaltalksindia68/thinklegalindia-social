# Think Legal India — twice-daily social post.
#
# TIMING IS DRIVEN BY MAKE.COM, NOT GitHub. GitHub's `schedule` trigger is best-effort
# and was firing runs 40 min to 10+ HOURS late, dumping every post into the IST night
# and (via slot misclassification) collapsing us to one post/day. So we removed the cron
# entirely. Make's reliable scheduler now fires two HTTP `workflow_dispatch` calls per
# day — 09:30 IST (slot=morning) and 21:30 IST (slot=evening) — each passing the slot
# explicitly so the run records the right slot even if GitHub starts it a little late.
name: post-social

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "Which daily slot this run is for"
        required: false
        default: "manual"
        type: choice
        options: [morning, evening, manual]

# GITHUB_TOKEN needs to commit state.json back so the rotation cursor advances.
permissions:
  contents: write

# Don't run two posts in parallel even if a manual + scheduled fire overlap.
concurrency:
  group: post-social
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install librsvg (for SVG fallback)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Materialise .env from secrets
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MAKE_API_TOKEN:     ${{ secrets.MAKE_API_TOKEN }}
          MAKE_TEAM_ID:       ${{ secrets.MAKE_TEAM_ID }}
          MAKE_ZONE:          ${{ secrets.MAKE_ZONE }}
          MAKE_WEBHOOK_URL:   ${{ secrets.MAKE_WEBHOOK_URL }}
          IMAGE_HOST:         ${{ secrets.IMAGE_HOST }}
        run: |
          umask 077
          {
            echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY"
            echo "MAKE_API_TOKEN=$MAKE_API_TOKEN"
            echo "MAKE_TEAM_ID=$MAKE_TEAM_ID"
            echo "MAKE_ZONE=$MAKE_ZONE"
            echo "MAKE_WEBHOOK_URL=$MAKE_WEBHOOK_URL"
            echo "IMAGE_HOST=$IMAGE_HOST"
          } > .env

      - name: Run pipeline (live)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Slot passed by Make (morning/evening); 'manual' for hand-triggered runs.
          SLOT: ${{ inputs.slot }}
          # GITHUB_REPOSITORY + GITHUB_RUN_ID are auto-set by Actions
        run: python3 pipeline.py --live

      - name: Persist rotation state + commit log
        run: |
          git config user.name  "tli-social-bot"
          git config user.email "bot@thinklegalindia.co"
          git add state.json || true
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "post: advance rotation [skip ci]"
            git push
          fi

      - name: Upload generated artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-${{ github.run_id }}
          path: |
            outputs/*.png
            outputs/cron.log
          retention-days: 14
          if-no-files-found: ignore
